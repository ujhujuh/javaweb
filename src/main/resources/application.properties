# Server Configuration
server.port=8080

# Bean Definition Overriding
spring.main.allow-bean-definition-overriding=true

# Spring MVC Path Matching Strategy (for Swagger)
spring.mvc.pathmatch.matching-strategy=ant_path_matcher

# MyBatis Plus Configuration
#mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.mapper-locations=classpath:mapper/*.xml

# ========================================
# MySQL Database Configuration (Druid)
# ========================================
spring.datasource.type=com.alibaba.druid.pool.DruidDataSource
spring.datasource.druid.url=jdbc:mysql://110.40.136.241:3306/javaweb?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&allowPublicKeyRetrieval=true
spring.datasource.druid.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.druid.username=javaweb
spring.datasource.druid.password=sf123456

# Druid Connection Pool Configuration
spring.datasource.druid.initial-size=5
spring.datasource.druid.min-idle=5
spring.datasource.druid.max-active=20
spring.datasource.druid.max-wait=60000
spring.datasource.druid.time-between-eviction-runs-millis=60000
spring.datasource.druid.min-evictable-idle-time-millis=300000
spring.datasource.druid.validation-query=SELECT 1
spring.datasource.druid.test-while-idle=true
spring.datasource.druid.test-on-borrow=false
spring.datasource.druid.test-on-return=false
spring.datasource.druid.pool-prepared-statements=true
spring.datasource.druid.max-pool-prepared-statement-per-connection-size=20
spring.datasource.druid.filters=stat,wall,log4j2

# ========================================
# Shiro Configuration
# ========================================
shiro.loginUrl=/auth/login
shiro.unauthorizedUrl=/auth/unauthorized
shiro.successUrl=/

# JWT Configuration
jwt.secret=javaweb_secret_key_2024
jwt.expiration=86400000

# ========================================
# Fastjson Configuration
# ========================================
spring.mvc.converters.preferred-json-mapper=fastjson

# ========================================
# Redis Configuration
# ========================================
spring.redis.host=110.40.136.241
spring.redis.port=6379
spring.redis.password=sf123456
spring.redis.database=0
spring.redis.timeout=5000
spring.redis.lettuce.pool.max-active=20
spring.redis.lettuce.pool.max-wait=-1
spring.redis.lettuce.pool.max-idle=10
spring.redis.lettuce.pool.min-idle=5

# ========================================
# Email Configuration
# ========================================
spring.mail.host=smtp.qq.com
spring.mail.port=587
spring.mail.username=your-email@qq.com
spring.mail.password=your-email-authorization-code
spring.mail.protocol=smtp
spring.mail.default-encoding=UTF-8
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.notification-to=your-email@qq.com

# ========================================
# US Sentiment Fetch Configuration
# ========================================
us-sentiment.fetch.timeout-ms=15000
us-sentiment.fetch.retry-times=2
us-sentiment.fetch.retry-interval-ms=1000
us-sentiment.fetch.user-agent=Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36
us-sentiment.enabled-sources=FRED_VIX,STOOQ_VIX,YAHOO_VIX,CNN_FEAR_GREED,CBOE_NAAIM,FRED_SP500

# ========================================
# MinIO Configuration
# ========================================
minio.endpoint=http://110.40.136.241:9000
minio.accessKey=admin
minio.secretKey=sf123456
minio.bucketName=javaweb
minio.secure=false

# ========================================
# File Upload Configuration
# ========================================
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
